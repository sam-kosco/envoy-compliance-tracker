name: PSA Compliance Data Refresh

on:
  schedule:
    # Runs every hour — comment out the two lines below to pause
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Run PSA data relay
        env:
          TENANT_ID:     ${{ secrets.TENANT_ID }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: python psa_generate_data.py

      - name: Commit and push psa_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add psa_data.json
          git diff --cached --quiet || git commit -m "chore: refresh psa_data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
